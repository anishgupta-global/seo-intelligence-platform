name: SEO Audit

# Audits anishgupta.eu + www.yoyaba.com daily, ~17:45 Europe/Berlin.
# SINGLE cron, NO time-gate: GitHub schedule delays just make it run a little
# later rather than skipping it (the previous two-cron + hour-gate design could
# skip a delayed run — which is exactly what happened). 15:45 UTC = 17:45 Berlin
# in summer (CEST); 16:45 in winter (CET) — a harmless 1-hour DST drift, traded
# for reliability. Fully hands-off: no interaction required.
on:
  schedule:
    - cron: "45 15 * * *"     # ~17:45 Europe/Berlin
  workflow_dispatch:            # manual "Run workflow" button

jobs:
  audit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        site:
          - "https://anishgupta.eu"
          - "https://www.yoyaba.com"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Zero pip dependencies (stdlib only) — nothing to install.
      - name: Run SEO audit (emails results in live mode)
        env:
          EMAIL_FROM:         ${{ secrets.EMAIL_FROM }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_TO:           ${{ secrets.EMAIL_TO }}
          CLAUDE_API_KEY:     ${{ secrets.CLAUDE_API_KEY }}
          SLACK_WEBHOOK_URL:  ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python run_audit.py "${{ matrix.site }}" --max-pages 80

      - uses: actions/upload-artifact@v4
        with:
          name: seo-report-${{ strategy.job-index }}
          path: reports/
          if-no-files-found: warn
